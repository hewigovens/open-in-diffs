name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: chrome-web-store
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends imagemagick librsvg2-bin jq

      - name: Install Chrome (needed to sign the CRX)
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb
          rm -f /tmp/chrome.deb

      - name: Pack signed CRX
        env:
          CWS_SIGNING_KEY: ${{ secrets.CWS_SIGNING_KEY }}
        run: |
          umask 077
          printf '%s\n' "$CWS_SIGNING_KEY" > "$RUNNER_TEMP/cws-key.pem"
          bash scripts/pack-crx.sh "$RUNNER_TEMP/cws-key.pem"
          rm -f "$RUNNER_TEMP/cws-key.pem"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@e7a8f85e1c67a31e6ed99a94b41bd0b71bbee6b8 # v2.0.9
        with:
          files: dist/*.crx
          generate_release_notes: true

      - name: Publish to Chrome Web Store
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: bash scripts/publish-cws.sh dist/open-in-diffs-*.crx

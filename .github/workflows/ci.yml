name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends imagemagick jq

      - name: Install Chrome (needed to pack the CRX)
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb
          rm -f /tmp/chrome.deb

      - name: Validate manifest.json
        run: jq empty src/manifest.json

      - name: Syntax-check scripts
        run: |
          node --check src/content.js
          node --check src/background.js

      - name: Pack CRX (throwaway key — verifies the build end to end)
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out "$RUNNER_TEMP/ci-key.pem"
          bash scripts/pack-crx.sh "$RUNNER_TEMP/ci-key.pem"
          rm -f "$RUNNER_TEMP/ci-key.pem"

      - name: Upload crx artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: open-in-diffs-crx
          path: dist/*.crx
          if-no-files-found: error
